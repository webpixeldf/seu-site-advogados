# ============================================
# Nginx Proxy Reverso - Seu Site Advogados
# ============================================
#
# COMO USAR NO HESTIACP:
#
# Opção 1 (Recomendada): Editar template no HestiaCP
#   1. Acesse HestiaCP (https://72.61.54.96:8083)
#   2. Vá em Web > seusiteadvogados.com.br > Edit
#   3. Em "Proxy Template" ou "Custom Nginx" cole o conteúdo abaixo
#
# Opção 2: Editar manualmente
#   Copie este conteúdo para:
#   /etc/nginx/conf.d/seusiteadvogados.com.br.conf
#   E reinicie: systemctl restart nginx
#
# ============================================

location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}

# Cache para arquivos estáticos (imagens, CSS, JS)
location /_next/static/ {
    proxy_pass http://127.0.0.1:3000;
    expires 365d;
    add_header Cache-Control "public, immutable";
}

location /images/ {
    proxy_pass http://127.0.0.1:3000;
    expires 30d;
    add_header Cache-Control "public";
}
